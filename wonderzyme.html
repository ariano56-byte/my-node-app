<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wonderzyme ERP – Supabase</title>
    <meta name="theme-color" content="#2563eb">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%232563eb'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='18' font-family='sans-serif' font-weight='bold'>W</text></svg>">
    <style>
        :root {
            --font-sans: system-ui, sans-serif;
            --bg-body: #f5f6fa; --bg-surface: #fff; --bg-surface-alt: #f8faff; --bg-metric: #f8faff;
            --bg-hover-row: #fafbff; --bg-input: #fff; --border-color: #e0e0e0; --border-light: #f0f0f0;
            --border-input: #d0d0d0; --text-primary: #1a1a1a; --text-secondary: #555; --text-tertiary: #888;
            --text-muted: #aaa; --text-nav: #555; --text-btn: #333; --color-primary: #2563eb;
            --color-primary-hover: #1d4ed8; --color-danger: #ef4444; --color-danger-hover: #dc2626;
            --color-success: #16a34a; --color-warning: #d97706; --nav-hover-bg: #f0f4ff;
            --nav-active-bg: #eff6ff; --btn-hover-bg: #f5f5f5; --progress-bg: #e5e7eb;
            --badge-blue-bg: #dbeafe; --badge-green-bg: #dcfce7; --badge-red-bg: #fee2e2;
            --badge-amber-bg: #fef3c7; --badge-gray-bg: #f1f5f9; --modal-overlay: rgba(0,0,0,0.35);
            --snackbar-bg: #1a1a1a; --snackbar-text: #fff; --radius-sm: 6px; --radius-md: 8px;
            --radius-lg: 10px; --radius-xl: 20px; --transition-fast: 0.15s ease;
        }
        body.dark {
            --bg-body: #111827; --bg-surface: #1f2937; --bg-surface-alt: #263348; --bg-metric: #1a2332;
            --bg-hover-row: #252f3f; --bg-input: #1f2937; --border-color: #374151; --border-light: #2a3344;
            --border-input: #4b5563; --text-primary: #e5e7eb; --text-secondary: #c4c8cf; --text-tertiary: #9ca3af;
            --text-muted: #6b7280; --text-nav: #c4c8cf; --text-btn: #e5e7eb; --color-primary: #3b82f6;
            --color-primary-hover: #2563eb; --color-danger: #ef4444; --color-danger-hover: #dc2626;
            --color-success: #22c55e; --color-warning: #f59e0b; --nav-hover-bg: #263348;
            --nav-active-bg: #1e3a5f; --btn-hover-bg: #374151; --progress-bg: #374151;
            --badge-blue-bg: #1e3a5f; --badge-green-bg: #14532d; --badge-red-bg: #450a0a;
            --badge-amber-bg: #451a03; --badge-gray-bg: #374151; --modal-overlay: rgba(0,0,0,0.6);
            --snackbar-bg: #e5e7eb; --snackbar-text: #1a1a1a;
        }
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:var(--font-sans);background:var(--bg-body);color:var(--text-primary);font-size:14px;display:flex;height:100vh;overflow:hidden}
        #sidebar{width:210px;min-width:210px;background:var(--bg-surface);border-right:0.5px solid var(--border-color);display:flex;flex-direction:column;height:100vh;z-index:10}
        #sidebar .logo{padding:18px 16px 12px;border-bottom:0.5px solid var(--border-color)}
        #sidebar .logo .brand{font-size:16px;font-weight:500;color:var(--color-primary)}
        #sidebar .logo .sub{font-size:11px;color:var(--text-tertiary);margin-top:2px}
        #sidebar nav{flex:1;padding:10px 0;overflow-y:auto}
        #sidebar nav button{display:flex;align-items:center;gap:10px;width:100%;padding:9px 16px;cursor:pointer;border:none;background:transparent;font-size:13px;color:var(--text-nav);text-align:left;font-family:inherit;transition:background var(--transition-fast),color var(--transition-fast)}
        #sidebar nav button:hover{background:var(--nav-hover-bg)}
        #sidebar nav button.active{background:var(--nav-active-bg);color:var(--color-primary);font-weight:500}
        #sidebar .user-area{padding:12px 16px;border-top:0.5px solid var(--border-color);font-size:12px;color:var(--text-tertiary);display:flex;align-items:center;justify-content:space-between;gap:4px;flex-wrap:wrap}
        #sidebar .user-area .settings-btn{background:none;border:none;cursor:pointer;color:var(--text-tertiary);font-size:14px;padding:2px 4px;border-radius:4px;transition:color var(--transition-fast)}
        #sidebar .user-area .settings-btn:hover{color:var(--color-primary)}
        #main{flex:1;display:flex;flex-direction:column;overflow:hidden}
        #topbar{background:var(--bg-surface);border-bottom:0.5px solid var(--border-color);padding:0 20px;height:50px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px;position:relative}
        #topbar .page-title{font-size:15px;font-weight:500;white-space:nowrap}
        #topbar .actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
        #content{flex:1;overflow-y:auto;padding:20px}
        .btn{padding:7px 14px;border-radius:var(--radius-sm);border:0.5px solid var(--border-input);background:var(--bg-surface);cursor:pointer;font-size:13px;color:var(--text-btn);font-family:inherit;transition:background var(--transition-fast)}
        .btn:hover{background:var(--btn-hover-bg)}
        .btn.primary{background:var(--color-primary);color:#fff;border-color:var(--color-primary)}
        .btn.primary:hover{background:var(--color-primary-hover)}
        .btn.danger{background:var(--color-danger);color:#fff;border-color:var(--color-danger)}
        .btn.danger:hover{background:var(--color-danger-hover)}
        .btn.sm{padding:4px 10px;font-size:12px}
        .btn:disabled{opacity:0.5;cursor:not-allowed}
        .card{background:var(--bg-surface);border:0.5px solid var(--border-color);border-radius:var(--radius-lg);padding:16px}
        .metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
        .metric{background:var(--bg-metric);border:0.5px solid var(--border-color);border-radius:var(--radius-md);padding:14px}
        .metric .label{font-size:12px;color:var(--text-tertiary);margin-bottom:4px}
        .metric .value{font-size:22px;font-weight:500;color:var(--color-primary)}
        .metric .sub{font-size:11px;color:var(--text-muted);margin-top:2px}
        .metric .warning-text{font-size:11px;color:var(--color-danger);font-weight:500;margin-top:2px}
        table{width:100%;border-collapse:collapse;font-size:13px}
        th{text-align:left;padding:8px 10px;font-weight:500;color:var(--text-tertiary);border-bottom:0.5px solid var(--border-color);font-size:12px;cursor:pointer}
        th:hover{color:var(--color-primary)}
        td{padding:9px 10px;border-bottom:0.5px solid var(--border-light)}
        tr:hover td{background:var(--bg-hover-row)}
        tr.selected td{background:var(--badge-blue-bg)}
        .badge{display:inline-block;padding:2px 8px;border-radius:var(--radius-xl);font-size:11px;font-weight:500}
        .badge.green{background:var(--badge-green-bg);color:var(--color-success)}
        .badge.red{background:var(--badge-red-bg);color:var(--color-danger)}
        .badge.blue{background:var(--badge-blue-bg);color:var(--color-primary)}
        .badge.amber{background:var(--badge-amber-bg);color:var(--color-warning)}
        .modal-bg{display:none;position:fixed;inset:0;background:var(--modal-overlay);z-index:100;align-items:center;justify-content:center}
        .modal-bg.open{display:flex}
        .modal{background:var(--bg-surface);border-radius:var(--radius-lg);padding:22px;width:460px;max-width:95vw;max-height:85vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.18)}
        .form-row{margin-bottom:12px}
        .form-row label{display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px}
        .form-row input,.form-row select,.form-row textarea{width:100%;padding:7px 10px;border:0.5px solid var(--border-input);border-radius:var(--radius-sm);font-size:13px;background:var(--bg-input);color:var(--text-primary)}
        .form-row input.invalid,.form-row select.invalid,.form-row textarea.invalid{border-color:var(--color-danger)!important}
        #snackbar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--snackbar-bg);color:var(--snackbar-text);padding:12px 20px;border-radius:var(--radius-md);font-size:13px;z-index:200;display:flex;gap:16px;opacity:0;pointer-events:none;transition:transform 0.3s,opacity 0.3s}
        #snackbar.show{transform:translateX(-50%) translateY(0);opacity:1;pointer-events:auto}
        #login-overlay{position:fixed;inset:0;background:var(--bg-body);z-index:300;display:flex;align-items:center;justify-content:center;flex-direction:column}
        #login-overlay.hidden{display:none}
        #login-box{background:var(--bg-surface);border-radius:var(--radius-lg);padding:32px;width:360px;box-shadow:0 8px 32px rgba(0,0,0,0.15);text-align:center}
        .role-badge{font-size:10px;padding:1px 6px;border-radius:10px;background:var(--badge-blue-bg);color:var(--color-primary)}
        #bulk-bar{display:none;background:var(--badge-blue-bg);padding:8px 16px;border-radius:var(--radius-md);margin-bottom:12px;align-items:center;gap:12px;font-size:13px}
        #bulk-bar.show{display:flex}
        ::-webkit-scrollbar{width:6px;height:6px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:var(--border-input);border-radius:3px}
    </style>
</head>
<body>
<div id="login-overlay">
    <div id="login-box">
        <h2>Wonderzyme ERP</h2>
        <div style="color:var(--text-tertiary);font-size:13px;margin-bottom:20px">Sign in to continue</div>
        <div class="form-row"><label>Username</label><input id="login-user" placeholder="admin"></div>
        <div class="form-row"><label>Password</label><input id="login-pass" type="password" placeholder="••••••"></div>
        <div id="login-error" style="color:var(--color-danger);font-size:12px;margin-bottom:12px;display:none"></div>
        <button class="btn primary" style="width:100%" onclick="doLogin()">Sign In</button>
        <div style="margin-top:12px;font-size:11px;color:var(--text-muted)">Default: admin / admin</div>
    </div>
</div>

<div id="sidebar">
    <div class="logo"><div class="brand">Wonderzyme</div><div class="sub">ERP System</div></div>
    <nav id="nav">
        <button onclick="showPage('dashboard')" class="active" data-page="dashboard"><svg viewBox="0 0 18 18"><rect x="1" y="1" width="7" height="7" rx="1.5" fill="#2563eb"/><rect x="10" y="1" width="7" height="7" rx="1.5" fill="#93c5fd"/><rect x="1" y="10" width="7" height="7" rx="1.5" fill="#93c5fd"/><rect x="10" y="10" width="7" height="7" rx="1.5" fill="#2563eb"/></svg>Dashboard</button>
        <button onclick="showPage('inventory')" data-page="inventory"><svg viewBox="0 0 18 18"><rect x="1" y="4" width="16" height="12" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M5 4V3a2 2 0 014 0v1" stroke="currentColor" stroke-width="1.2"/><path d="M9 4V3a2 2 0 014 0v1" stroke="currentColor" stroke-width="1.2"/><path d="M4 9h10M4 12h6" stroke="currentColor" stroke-width="1"/></svg>Inventory</button>
        <button onclick="showPage('tasks')" data-page="tasks"><svg viewBox="0 0 18 18"><rect x="1" y="1" width="16" height="16" rx="2" stroke="currentColor" stroke-width="1.2"/><path d="M5 6h8M5 9h8M5 12h5" stroke="currentColor" stroke-width="1"/><circle cx="3.5" cy="6" r="1" fill="currentColor"/><circle cx="3.5" cy="9" r="1" fill="currentColor"/><circle cx="3.5" cy="12" r="1" fill="currentColor"/></svg>Tasks</button>
        <button onclick="showPage('employees')" data-page="employees"><svg viewBox="0 0 18 18"><circle cx="9" cy="6" r="3.5" stroke="currentColor" stroke-width="1.2"/><path d="M2 15c0-3.314 3.134-6 7-6s7 2.686 7 6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>Employees</button>
        <button onclick="showPage('sales')" data-page="sales"><svg viewBox="0 0 18 18"><path d="M2 14l4-4 3 2 4-5 3 2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><rect x="1" y="1" width="16" height="16" rx="2" stroke="currentColor" stroke-width="1.2"/></svg>Sales</button>
        <button onclick="showPage('expenses')" data-page="expenses"><svg viewBox="0 0 18 18"><rect x="1" y="3" width="16" height="12" rx="2" stroke="currentColor" stroke-width="1.2"/><path d="M1 7h16" stroke="currentColor" stroke-width="1"/><circle cx="5" cy="11" r="1.2" fill="currentColor"/></svg>Expenses</button>
    </nav>
    <div class="user-area"><span id="sidebar-user">Admin</span><button class="settings-btn" onclick="changePasswordModal()">🔒</button><button class="settings-btn" onclick="showSettingsModal()">⚙</button><button class="settings-btn" onclick="doLogout()">↪</button></div>
</div>

<div id="main">
    <div id="topbar">
        <div class="page-title" id="page-title">Dashboard</div>
        <div class="actions" id="topbar-actions">
            <input type="text" id="global-search" class="search-input" placeholder="Search..." onkeyup="globalSearch()" style="width:200px;padding:7px 12px;border:0.5px solid var(--border-input);border-radius:var(--radius-sm);font-size:13px;background:var(--bg-input);color:var(--text-primary)">
            <button id="notif-bell" onclick="toggleNotifDropdown()">🔔<span class="badge-count" id="notif-count">0</span></button>
            <button class="btn" id="dark-toggle" onclick="toggleDarkMode()">🌙</button>
        </div>
        <div id="notif-dropdown" style="display:none;position:absolute;top:44px;right:4px;background:var(--bg-surface);border:0.5px solid var(--border-color);border-radius:var(--radius-md);width:340px;max-height:400px;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.15);z-index:50;padding:12px"></div>
    </div>
    <div id="content"></div>
</div>

<div class="modal-bg" id="modal-bg"><div class="modal" id="modal-box"><h3 id="modal-title"></h3><div id="modal-body"></div></div></div>
<div id="snackbar"><span id="snackbar-msg"></span><button id="snackbar-undo" style="display:none">Undo</button></div>
<input type="file" id="import-file-input" accept=".json" style="display:none" onchange="handleImportFile(event)">

<script src="/supabase-config.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ============ SUPABASE CONFIGURATION ============
const SUPABASE_URL = window.SUPABASE_URL || '';
const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY || '';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ============ APP STATE ============
let data = { inventory:[], tasks:[], employees:[], sales:[], expenses:[] };
let activityLog = [];
let editId = null, currentPage = 'dashboard', trashBin = [], snackbarTimer = null;
let darkMode = localStorage.getItem('erp_darkmode') === 'true';
let selectedRows = [], currentUser = null;

// ============ USERS (localStorage) ============
const ROLES = { admin:{canEdit:true,canDelete:true,canExport:true,canImport:true,canManageUsers:true,canReset:true,label:'Admin'}, manager:{canEdit:true,canDelete:true,canExport:true,canImport:true,canManageUsers:false,canReset:false,label:'Manager'}, staff:{canEdit:false,canDelete:false,canExport:false,canImport:false,canManageUsers:false,canReset:false,label:'Staff'} };
const DEFAULT_USERS = [{username:'admin',password:'admin',role:'admin'},{username:'manager',password:'manager',role:'manager'},{username:'staff',password:'staff',role:'staff'}];
function getUsers(){try{return JSON.parse(localStorage.getItem('erp_users')) || [...DEFAULT_USERS]}catch(e){return [...DEFAULT_USERS]}}
function saveUsers(u){localStorage.setItem('erp_users',JSON.stringify(u))}
function initUsers(){if(!localStorage.getItem('erp_users')) saveUsers(DEFAULT_USERS)}

// ============ AUTH ============
function doLogin(){
    const raw=document.getElementById('login-user').value;
    const u=raw.trim();
    if(raw!==u||u.includes(' ')){document.getElementById('login-error').style.display='block';document.getElementById('login-error').textContent='Username must not contain spaces.';return}
    const p=document.getElementById('login-pass').value;
    const users=getUsers();const found=users.find(x=>x.username===u && x.password===p);
    if(!found){document.getElementById('login-error').style.display='block';document.getElementById('login-error').textContent='Invalid username or password.';return}
    currentUser=found;
    document.getElementById('login-error').style.display='none';
    document.getElementById('login-overlay').classList.add('hidden');
    document.getElementById('sidebar-user').innerHTML=`${currentUser.username} <span class="role-badge">${ROLES[currentUser.role].label}</span>`;
    loadData().then(()=>{ renders.dashboard(); renderNotifications(); });
}
function doLogout(){currentUser=null;document.getElementById('login-overlay').classList.remove('hidden');document.getElementById('login-user').value='';document.getElementById('login-pass').value='';document.getElementById('content').innerHTML=''}
function canEdit(){return currentUser&&ROLES[currentUser.role].canEdit}
function canDelete(){return currentUser&&ROLES[currentUser.role].canDelete}
function canExport(){return currentUser&&ROLES[currentUser.role].canExport}
function canImport(){return currentUser&&ROLES[currentUser.role].canImport}
function canManageUsers(){return currentUser&&ROLES[currentUser.role].canManageUsers}
function canReset(){return currentUser&&ROLES[currentUser.role].canReset}

// ============ PASSWORD / USER MGMT ============
function changePasswordModal(){
    if(!currentUser)return;
    document.getElementById('modal-title').textContent='Change Password';
    document.getElementById('modal-body').innerHTML=`<div class="form-row"><label>Current</label><input id="cp-old" type="password"></div><div class="form-row"><label>New</label><input id="cp-new" type="password"></div><div id="cp-error" style="color:var(--color-danger);font-size:12px;display:none;margin-bottom:8px"></div><div class="form-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="doChangePassword()">Update</button></div>`;
    document.getElementById('modal-bg').classList.add('open'); window._modalSave=null;
}
function doChangePassword(){
    const oldPass=document.getElementById('cp-old').value, newPass=document.getElementById('cp-new').value, err=document.getElementById('cp-error');
    if(!oldPass||!newPass){err.textContent='Both fields required.';err.style.display='block';return}
    if(newPass.length<4){err.textContent='Min 4 characters.';err.style.display='block';return}
    const users=getUsers(); const idx=users.findIndex(u=>u.username===currentUser.username);
    if(idx===-1||users[idx].password!==oldPass){err.textContent='Current password incorrect.';err.style.display='block';return}
    users[idx].password=newPass; saveUsers(users); currentUser.password=newPass; closeModal(); showSnackbar('Password updated.');
}
function changeUserRole(username){
    const users=getUsers(); const u=users.find(x=>x.username===username); if(!u)return;
    const newRole=u.role==='admin'?'manager':u.role==='manager'?'staff':'admin';
    if(!confirm(`Change ${username}'s role from ${u.role} to ${newRole}?`))return;
    u.role=newRole; saveUsers(users); closeModal(); showSettingsModal(); showSnackbar('Role updated.');
}
function deleteUser(username){
    if(!confirm(`Delete user "${username}"?`))return;
    let users=getUsers(); users=users.filter(u=>u.username!==username); saveUsers(users); closeModal(); showSettingsModal(); showSnackbar('User deleted.');
}
function addUserModal(){
    document.getElementById('modal-title').textContent='Add User';
    document.getElementById('modal-body').innerHTML=`
    <div class="form-row"><label>Username *</label><input id="f-username" placeholder="No spaces"></div>
    <div class="form-row"><label>Password *</label><input id="f-password" type="password"></div>
    <div class="form-row"><label>System Role</label><select id="f-role"><option>staff</option><option>manager</option><option>admin</option></select></div>
    <div class="form-row"><label>Email *</label><input id="f-email" type="email" placeholder="user@example.com"></div>
    <div class="form-row"><label>Phone *</label><input id="f-phone" placeholder="09xxxxxxxxx"></div>
    <div class="form-row"><label>Position</label><input id="f-position" placeholder="e.g. Cashier"></div>
    <div class="form-actions"><button class="btn" onclick="closeModal();showSettingsModal();">Cancel</button><button class="btn primary" onclick="saveNewUser()">Add User</button></div>`;
    document.getElementById('modal-bg').classList.add('open'); window._modalSave=null;
}
function saveNewUser(){
    const raw=document.getElementById('f-username').value;
    const u=raw.trim();
    if(raw!==u||u.includes(' ')){showSnackbar('Username cannot contain spaces.');return}
    const p=document.getElementById('f-password').value;
    const r=document.getElementById('f-role').value;
    const email=document.getElementById('f-email').value.trim();
    const phone=document.getElementById('f-phone').value.trim();
    const position=document.getElementById('f-position').value.trim();
    if(!u||!p){showSnackbar('Username and password required.');return}
    if(p.length<4){showSnackbar('Password min 4 chars.');return}
    if(!email||!phone){showSnackbar('Email and phone are required.');return}
    const users=getUsers(); if(users.find(x=>x.username===u)){showSnackbar('Username exists.');return}
    users.push({username:u,password:p,role:r}); saveUsers(users);
    if(!data.employees.find(e=>e.name===u)){
        const emp = { id: crypto.randomUUID(), name:u, dept:r, role:position, email, phone, status:'active' };
        data.employees.push(emp);
        supabase.from('employees').upsert(emp);
    }
    closeModal(); showSettingsModal(); showSnackbar(`User "${u}" created with employee profile.`);
}
function resetUserPassword(username){
    const newPass=prompt(`New password for "${username}":`); if(!newPass)return;
    if(newPass.length<4){showSnackbar('Min 4 chars.');return}
    const users=getUsers(); const user=users.find(u=>u.username===username);
    if(!user)return; user.password=newPass; saveUsers(users);
    if(currentUser&&currentUser.username===username)currentUser.password=newPass;
    showSnackbar('Password reset.');
}

// ============ NOTIFICATIONS ============
function getNotifications(){
    const notifs=[],now=new Date();
    data.tasks.forEach(t=>{
        if(t.due&&t.status!=='done'){
            const due=new Date(t.due+'T23:59:59');
            if(due<now)notifs.push({type:'overdue',msg:`Task "${t.title}" is overdue`,module:'tasks'});
            else if(Math.ceil((due-now)/86400000)<=2)notifs.push({type:'due-soon',msg:`Task "${t.title}" due soon`,module:'tasks'});
        }
    });
    data.inventory.forEach(i=>{
        const q=parseInt(i.qty||0);
        if(q===0)notifs.push({type:'out-of-stock',msg:`"${i.name}" out of stock`,module:'inventory'});
        else if(q<5)notifs.push({type:'low-stock',msg:`"${i.name}" low stock (${q})`,module:'inventory'});
    });
    data.expenses.forEach(e=>{
        if(e.status==='pending')notifs.push({type:'pending',msg:`Expense "${e.description}" pending approval`,module:'expenses'});
    });
    return notifs;
}

function getToday(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

// ============ SUPABASE DATA LOAD ============
async function loadData(){
    const tables = ['inventory','tasks','employees','sales','expenses','activity_log'];
    const results = await Promise.all(tables.map(t=> supabase.from(t).select('*')));
    data.inventory = (results[0].data||[]).map(i=>({...i, qty:String(i.qty||0), price:String(i.price||0), sellprice:String(i.sellprice||0)}));
    data.tasks = results[1].data||[];
    data.employees = results[2].data||[];
    data.sales = results[3].data||[];
    data.expenses = results[4].data||[];
    activityLog = (results[5].data||[]).map(a=>({timestamp:a.timestamp, message:a.message, module:a.module}));
    const now=Date.now(); const saved=localStorage.getItem('erp_trash');
    if(saved){ try{ trashBin=JSON.parse(saved).filter(t=>t.expiresAt>now); }catch(e){trashBin=[]} }
    else trashBin=[];
    for(const t of trashBin){ if(t.expiresAt>now && data[t.module]) data[t.module].push(t.item); }
    trashBin=[]; localStorage.removeItem('erp_trash');
}
async function addActivity(msg, mod){
    const entry = { message:msg, module:mod };
    const { error } = await supabase.from('activity_log').insert(entry);
    if(!error){ entry.timestamp = new Date().toISOString(); activityLog.push(entry); }
}

// ============ SYNC INVENTORY EXPENSE ============
async function syncInvExpense(invItem){
    const totalCost = parseFloat(invItem.price||0)*parseInt(invItem.qty||0);
    const description = `Inventory: ${invItem.name} (${invItem.qty} × ₱${parseFloat(invItem.price||0).toLocaleString()})`;
    const existing = data.expenses.find(e => e.invId === invItem.id);
    if (existing) {
        const updated = { ...existing, description, amount: String(totalCost), date: getToday() };
        await supabase.from('expenses').upsert(updated);
        data.expenses = data.expenses.map(e => e.id === existing.id ? updated : e);
    } else if (totalCost > 0) {
        const newExp = { id: crypto.randomUUID(), description, category: 'Inventory Cost', amount: String(totalCost), status: 'approved', date: getToday(), invId: invItem.id };
        await supabase.from('expenses').upsert(newExp);
        data.expenses.push(newExp);
    }
}

// ============ DELETE ============
async function del(mod, id){
    if(!canDelete()){showSnackbar('Your role does not allow deletion.');return}
    const item = data[mod].find(i=>i.id===id); if(!item)return;
    if(mod==='sales' && item.invId){
        const inv = data.inventory.find(i=>i.id===item.invId);
        if(inv){ inv.qty = String(parseInt(inv.qty)+parseInt(item.qty||0)); await supabase.from('inventory').upsert(inv); }
    }
    if(mod==='inventory'){
        const linked = data.expenses.filter(e=>e.invId===id);
        for(const e of linked) await supabase.from('expenses').delete().eq('id',e.id);
        data.expenses = data.expenses.filter(e=>e.invId!==id);
    }
    await supabase.from(mod).delete().eq('id',id);
    data[mod] = data[mod].filter(i=>i.id!==id);
    addActivity(`Deleted ${item.name||item.title||item.description||'item'} from ${mod}`, mod);
    const trashEntry = {item, module:mod, id, expiresAt:Date.now()+7000};
    trashBin.push(trashEntry); localStorage.setItem('erp_trash',JSON.stringify(trashBin));
    const label = item.name||item.title||item.description||'Item';
    showSnackbar(`"${label}" deleted.`, async ()=>{
        const idx = trashBin.findIndex(t=>t.id===id&&t.module===mod);
        if(idx!==-1){
            const restored = trashBin[idx];
            await supabase.from(mod).upsert(restored.item);
            data[mod].push(restored.item);
            if(mod==='sales' && restored.item.invId){
                const inv = data.inventory.find(i=>i.id===restored.item.invId);
                if(inv){ inv.qty = String(parseInt(inv.qty)-parseInt(restored.item.qty||0)); await supabase.from('inventory').upsert(inv); }
            }
            if(mod==='inventory') syncInvExpense(restored.item);
            trashBin.splice(idx,1); localStorage.setItem('erp_trash',JSON.stringify(trashBin));
            renders[currentPage](); addActivity('Undo delete', mod);
        }
    });
    setTimeout(()=>{
        const idx=trashBin.findIndex(t=>t.id===id&&t.module===mod);
        if(idx!==-1){trashBin.splice(idx,1); localStorage.setItem('erp_trash',JSON.stringify(trashBin));}
    },7000);
    selectedRows = selectedRows.filter(r=>r!==id);
    renders[currentPage](); renderNotifications();
}

// ============ BULK ============
async function bulkDelete(mod){
    if(!canDelete()){showSnackbar('Deletion not allowed.');return}
    if(selectedRows.length===0){showSnackbar('No rows selected.');return}
    if(!confirm(`Delete ${selectedRows.length} items?`))return;
    const items = data[mod].filter(i=>selectedRows.includes(i.id));
    for(const item of items){
        if(mod==='sales' && item.invId){
            const inv = data.inventory.find(i=>i.id===item.invId);
            if(inv){ inv.qty = String(parseInt(inv.qty)+parseInt(item.qty||0)); await supabase.from('inventory').upsert(inv); }
        }
        if(mod==='inventory'){
            const linked = data.expenses.filter(e=>e.invId===item.id);
            for(const e of linked) await supabase.from('expenses').delete().eq('id',e.id);
            data.expenses = data.expenses.filter(e=>e.invId!==item.id);
        }
        await supabase.from(mod).delete().eq('id',item.id);
        data[mod] = data[mod].filter(i=>i.id!==item.id);
        trashBin.push({item, module:mod, id:item.id, expiresAt:Date.now()+7000});
        localStorage.setItem('erp_trash',JSON.stringify(trashBin));
    }
    addActivity(`Bulk deleted ${items.length} items`,mod);
    showSnackbar(`${items.length} items deleted.`);
    selectedRows=[]; renders[currentPage](); renderNotifications();
}
function bulkExport(mod){
    if(!canExport()){showSnackbar('Export not allowed.');return}
    const items=data[mod].filter(i=>selectedRows.includes(i.id));
    if(!items.length){showSnackbar('No rows selected.');return}
    let csv='';
    if(mod==='inventory')csv='Name,SKU,Category,Quantity,Cost,Sell Price\n'+items.map(i=>[i.name,i.sku,i.category,i.qty,i.price,i.sellprice].map(c=>'"'+String(c||'').replace(/"/g,'""')+'"').join(',')).join('\n');
    else if(mod==='sales')csv='Platform,Product,Quantity,Revenue,Cost,Profit,Date\n'+items.map(s=>[s.platform,s.product,s.qty,s.amount,s.cost,(parseFloat(s.amount||0)-parseFloat(s.cost||0)).toFixed(2),s.date].map(c=>'"'+String(c||'').replace(/"/g,'""')+'"').join(',')).join('\n');
    else if(mod==='expenses')csv='Description,Category,Amount,Status,Date\n'+items.map(e=>[e.description,e.category,e.amount,e.status,e.date].map(c=>'"'+String(c||'').replace(/"/g,'""')+'"').join(',')).join('\n');
    const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`${mod}_export.csv`;a.click();URL.revokeObjectURL(url);
    showSnackbar(`Exported ${items.length} rows.`);
}

// ============ GLOBAL SEARCH ============
function globalSearch(){
    const term=document.getElementById('global-search').value.trim().toLowerCase();if(!term)return;
    for(const mod of['inventory','tasks','employees','sales','expenses']){
        const found=data[mod].find(item=>{
            if(mod==='inventory')return(item.name||'').toLowerCase().includes(term)||(item.sku||'').toLowerCase().includes(term);
            if(mod==='tasks')return(item.title||'').toLowerCase().includes(term)||(item.assignee||'').toLowerCase().includes(term);
            if(mod==='employees')return(item.name||'').toLowerCase().includes(term)||(item.dept||'').toLowerCase().includes(term);
            if(mod==='sales')return(item.product||'').toLowerCase().includes(term)||(item.platform||'').toLowerCase().includes(term);
            if(mod==='expenses')return(item.description||'').toLowerCase().includes(term)||(item.category||'').toLowerCase().includes(term);
            return false;
        });
        if(found){showPage(mod);setTimeout(()=>{if(mod==='inventory')document.getElementById('inv-search').value=term;renders[mod]()},50);return}
    }
    showSnackbar('No matches found.');
}

async function invModal(id){
    if(!canEdit()){showSnackbar('Editing not allowed.');return}
    const item=id?data.inventory.find(i=>i.id===id):{};editId=id||null;
    document.getElementById('modal-title').textContent=id?'Edit Item':'Add Item';
    document.getElementById('modal-body').innerHTML=`<div class="form-row"><label>Name *</label><input id="f-name" value="${item.name||''}"></div>
        <div class="form-row"><label>SKU</label><input id="f-sku" value="${item.sku||''}"></div>
        <div class="form-row"><label>Category</label><input id="f-cat" value="${item.category||''}"></div>
        <div class="form-row"><label>Quantity *</label><input id="f-qty" type="number" min="1" value="${item.qty||''}"></div>
        <div class="form-row"><label>Cost *</label><input id="f-price" type="number" min="0.01" value="${item.price||''}" oninput="onInvPriceChange()"></div>
        <div class="form-row"><label>Sell Price *</label><input id="f-sellprice" type="number" min="0.01" value="${item.sellprice||''}" oninput="onInvPriceChange()"></div>
        <div style="background:var(--bg-metric);border-radius:8px;padding:10px;font-size:13px"><span>Margin: <span id="lbl-margin">0</span> | <span id="lbl-marginpct">0%</span></div>
        <div class="form-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="saveInv()">Save</button></div>`;
    document.getElementById('modal-bg').classList.add('open');
    window._modalSave = saveInv;
    setTimeout(onInvPriceChange,50);
}
function onInvPriceChange(){const cost=parseFloat(document.getElementById('f-price')?.value)||0,sell=parseFloat(document.getElementById('f-sellprice')?.value)||0,margin=sell-cost;document.getElementById('lbl-margin').textContent='₱'+margin.toLocaleString();document.getElementById('lbl-marginpct').textContent=(sell>0?((margin/sell)*100).toFixed(1):0)+'%'}
async function saveInv(){
    const name=val('f-name').trim(); if(!name){showSnackbar('Name required.');return}
    const qty=parseInt(val('f-qty'))||0, price=parseFloat(val('f-price'))||0, sellprice=parseFloat(val('f-sellprice'))||0;
    if(qty<=0||price<=0||sellprice<=0){showSnackbar('All fields must be >0');return}
    const obj={id:editId||crypto.randomUUID(), name, sku:val('f-sku'), category:val('f-cat'), qty:String(qty), price:String(price), sellprice:String(sellprice)};
    await supabase.from('inventory').upsert(obj);
    if(editId) data.inventory = data.inventory.map(i=>i.id===editId?obj:i); else data.inventory.push(obj);
    await syncInvExpense(obj);
    addActivity(`${editId?'Edited':'Added'} "${obj.name}"`,'inventory');
    closeModal(); renders.inventory(); renderNotifications();
}
